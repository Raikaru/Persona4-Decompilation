name: Shin Megami Tensei - Persona 4 (USA) (SLUS_217.82)
sha1: 3d1d3d2b9d6ccb60836db239ab49674223025a78
options:
  platform: ps2
  basename: slus21782
  base_path: ..
  target_path: image.bin
  asm_path: asm
  src_path: src
  asset_path: assets
  ld_script_path: build/slus21782.ld
  symbol_addrs_path: config/symbol_addrs.txt
  mips_abi_gpr: numeric
  mips_abi_float_regs: numeric
  find_file_boundaries: True
  use_legacy_include_asm: False
  disasm_unknown: True
  asm_inc_header: ""
segments:
  - name: main
    type: code
    start: 0x0
    vram: 0x100000
    subsegments:
      - [0x0, asm, code1]
      - [0x42da00, bin, data1]
      # Shared PS2 SDK/kernel blob. It matches Persona 3 FES's code2 layout
      # (0x18f0 bytes) apart from ten absolute call/address words.
      - [0x60c850, asm, code2]
      - [0x60e140, bin, data2]
      # Startup clears virtual 0x764280-0x938a00; these file bytes are all zero.
      - [0x664280, bin, zero_fill]
  - [0x838a00]
